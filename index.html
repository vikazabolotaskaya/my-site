<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Logs</title>
    <style>
        /* Полноэкранный iframe без отступов и скроллов */
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #fff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Здесь указывается нужный URL -->
    <iframe src="https://lifemart.ru/apps/coffee-logs/index.html?department=240"
            allow="fullscreen; geolocation; microphone; camera"
            loading="lazy">
    </iframe>
</body>
</html>
